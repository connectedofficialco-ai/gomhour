# 앱 전용 Legacy Worker (2.11 버전용)
# gom-hr.com/app*, /dashboard, /setup, /history, /settings, /auth*, /api*, /signup, /logout
name = "gomhour-legacy"
main = "index-legacy.tsx"
compatibility_date = "2025-02-05"

[assets]
directory = "./public"
run_worker_first = ["/app*", "/dashboard*", "/auth*", "/api*", "/setup*", "/history*", "/settings*", "/signup*", "/logout*"]

# 앱 경로만 Legacy Worker로 라우팅 (gom-hr.com, www.gom-hr.com)
# 더 구체적인 경로가 Main Worker보다 우선
[[routes]]
pattern = "gom-hr.com/app*"
